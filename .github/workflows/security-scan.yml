name: Security Scanning (SAST/DAST)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Prevent concurrent scans on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Python SAST — Bandit
  # ──────────────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit scan
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            --confidence-level medium \
            -x 'app/__pycache__,app/frontend' \
            || true

      - name: Display results
        if: always()
        run: |
          if [ -f bandit-results.json ]; then
            python -m json.tool bandit-results.json
          fi

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Python dependency audit — pip-audit
  # ──────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Python Dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output pip-audit-results.json \
            || true

      - name: Display results
        if: always()
        run: |
          if [ -f pip-audit-results.json ]; then
            python -m json.tool pip-audit-results.json
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # JavaScript dependency audit — npm audit
  # ──────────────────────────────────────────────
  npm-audit:
    name: npm audit (JS Dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci --prefer-offline

      - name: Run npm audit
        working-directory: app/frontend
        run: |
          npm audit --json > npm-audit-results.json 2>&1 || true

      - name: Display results
        if: always()
        working-directory: app/frontend
        run: |
          if [ -f npm-audit-results.json ]; then
            cat npm-audit-results.json | head -100
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit-results
          path: app/frontend/npm-audit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Container image scanning — Trivy
  # ──────────────────────────────────────────────
  trivy:
    name: Trivy (Container Scan)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'app/frontend/package-lock.json'

      - name: Cache frontend build
        id: frontend-cache
        uses: actions/cache@v5
        with:
          path: |
            app/frontend/dist
            app/frontend/node_modules
          key: frontend-build-${{ hashFiles('app/frontend/package-lock.json', 'app/frontend/src/**') }}
          restore-keys: |
            frontend-build-

      - name: Build Frontend
        if: steps.frontend-cache.outputs.cache-hit != 'true'
        working-directory: app/frontend
        run: |
          npm ci
          rm -rf dist || true
          npm run build

      - name: Build Docker image for scanning
        id: docker-build
        run: docker build -f docker/Dockerfile -t streamvault:scan .

      - name: Run Trivy vulnerability scanner (SARIF)
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-db:2'
          TRIVY_JAVA_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-java-db:1'
        with:
          image-ref: 'streamvault:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security
        if: steps.docker-build.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'
        continue-on-error: true

      - name: Run Trivy (table output for logs)
        if: steps.docker-build.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-db:2'
          TRIVY_JAVA_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-java-db:1'
        with:
          image-ref: 'streamvault:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Clean up
        if: always()
        run: docker rmi streamvault:scan 2>/dev/null || true

  # ──────────────────────────────────────────────
  # Dockerfile linting — Hadolint
  # ──────────────────────────────────────────────
  hadolint:
    name: Hadolint (Dockerfile Lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-results.sarif
          category: 'hadolint'
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Secret scanning — Gitleaks
  # ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (Secret Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
